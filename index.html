<main class="pos-container">
    <section class="categories">
        <div class="cat-item active">Tất cả</div>
        <div class="cat-item">Cafe</div>
        <div class="cat-item">Trà sữa</div>
        <div class="cat-item">Bánh</div>
    </section>

    <section class="product-grid">
        <div class="product-card" onclick="addToCart('Cafe Đen', 25000)">
            <div class="img-placeholder">☕</div>
            <div class="p-info">
                <span class="p-name">Cafe Đen</span>
                <span class="p-price">25.000đ</span>
            </div>
        </div>
        <div class="product-card" onclick="addToCart('Trà Đào', 35000)">
            <div class="img-placeholder">🍑</div>
            <div class="p-info">
                <span class="p-name">Trà Đào</span>
                <span class="p-price">35.000đ</span>
            </div>
        </div>
        </section>

    <section class="checkout-bar">
        <div class="cart-summary">
            <span id="cart-count">0 món</span>
            <strong id="total-price">0đ</strong>
        </div>
        <button class="btn-pay" onclick="processPayment()">Thanh toán ➔</button>
    </section>
</main>
